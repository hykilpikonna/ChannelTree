services:
  postgres:
    image: postgres:latest
    container_name: tgtree-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cat
      POSTGRES_PASSWORD: meow
      POSTGRES_DB: tgtree
    ports:
      - "127.0.0.1:5444:5432"
    volumes:
      - tgtree-db:/var/lib/postgresql

volumes:
  tgtree-db:
